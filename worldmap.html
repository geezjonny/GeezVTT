<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>World Map Editor v0.2 (Blended Region Weather)</title>
<style>
body{margin:0;font-family:sans-serif;background:#0f1115;color:#e9edf5}
.wrap{padding:16px}
.grid{display:grid;grid-template-columns:320px 1fr;gap:16px}
.card{background:#171a21;border:1px solid #2b3445;border-radius:12px;padding:12px}
button{padding:8px 12px;border-radius:8px;border:1px solid #2b3445;background:#20283a;color:white;cursor:pointer}
.primary{background:#6ea8fe}
.map{position:relative;overflow:auto;border:1px solid #2b3445}
.marker{position:absolute;width:14px;height:14px;border-radius:50%;transform:translate(-50%,-50%);border:2px solid white}
.marker.region_anchor{background:#f472b6}
.marker.other{background:#60a5fa}
.selected{outline:2px solid yellow}
</style>
</head>
<body>
<div class="wrap">
<h1>World Map v0.2 – Blended Region Weather</h1>
<div class="grid">

<div class="card">
<h3>Controls</h3>
<input id="mapUrl" placeholder="map image url" />
<button class="primary" id="loadMap">Load Map</button>
<hr/>
<label>Mode:</label>
<select id="mode">
<option value="place">Place Point</option>
<option value="position">Set Current Position</option>
</select>
<hr/>
<h4>Selected / New</h4>
<input id="name" placeholder="name" />
<select id="type">
<option value="region_anchor">Region Anchor</option>
<option value="city">City</option>
<option value="town">Town</option>
<option value="poi">POI</option>
</select>
<input id="region" placeholder="regionId" />
<input id="weather" type="number" value="0" />
<input id="x" placeholder="x%" />
<input id="y" placeholder="y%" />
<button id="save">Save</button>
<button id="clear">Clear</button>
<hr/>
<h4>Blended Result</h4>
<div id="blendResult">—</div>
<div id="blendSources"></div>
</div>

<div class="card">
<div class="map" id="mapWrap">
<div id="mapStage" style="position:relative;display:inline-block">
<img id="mapImg" />
<div id="markers" style="position:absolute;inset:0"></div>
</div>
</div>
</div>

</div>
</div>

<script>
let places=[];
let selected=null;
let currentPos=null;

const mapImg=document.getElementById('mapImg');
const markers=document.getElementById('markers');

function clamp(n,min,max){return Math.max(min,Math.min(max,n))}

function distance(a,b){
return Math.hypot(a.x-b.x,a.y-b.y)
}

function getAnchors(){
return places.filter(p=>p.type==='region_anchor')
}

function weightedBlend(pos){
const anchors=getAnchors();
if(anchors.length===0)return null;

const withDist=anchors.map(a=>{
const d=distance(pos,{x:a.xPct,y:a.yPct})
return {...a,dist:Math.max(d,0.001)}
})

withDist.sort((a,b)=>a.dist-b.dist);
const nearest=withDist.slice(0,3);

let totalWeight=0;
let sum=0;

nearest.forEach(a=>{
const w=1/a.dist;
sum+=a.weatherModifier*w;
 totalWeight+=w;
})

const result=sum/totalWeight;
return {value:result, sources:nearest}
}

function render(){
markers.innerHTML='';
places.forEach(p=>{
const el=document.createElement('div');
el.className='marker '+(p.type==='region_anchor'?'region_anchor':'other')+(p.id===selected?' selected':'');
el.style.left=p.xPct+'%';
el.style.top=p.yPct+'%';
el.onclick=(e)=>{e.stopPropagation();select(p.id)};
markers.appendChild(el);
})
}

function select(id){
selected=id;
const p=places.find(p=>p.id===id);
if(!p)return;
document.getElementById('name').value=p.name;
document.getElementById('type').value=p.type;
document.getElementById('region').value=p.regionId;
document.getElementById('weather').value=p.weatherModifier;
document.getElementById('x').value=p.xPct;
document.getElementById('y').value=p.yPct;
render();
}

function save(){
const id=selected||Date.now().toString();
const p={
id,
name:document.getElementById('name').value,
type:document.getElementById('type').value,
regionId:document.getElementById('region').value,
weatherModifier:Number(document.getElementById('weather').value),
xPct:Number(document.getElementById('x').value),
yPct:Number(document.getElementById('y').value)
};

const existingIndex=places.findIndex(x=>x.id===id);
if(existingIndex>=0)places[existingIndex]=p;
else places.push(p);

selected=id;
render();
}

function clearSel(){selected=null;}

function handleClick(e){
const rect=mapImg.getBoundingClientRect();
const x=((e.clientX-rect.left)/rect.width)*100;
const y=((e.clientY-rect.top)/rect.height)*100;

const mode=document.getElementById('mode').value;

if(mode==='place'){
document.getElementById('x').value=x.toFixed(2);
document.getElementById('y').value=y.toFixed(2);
}

if(mode==='position'){
currentPos={x:x,y:y};
const result=weightedBlend(currentPos);
if(result){
document.getElementById('blendResult').innerText='Blended Modifier: '+result.value.toFixed(2);
document.getElementById('blendSources').innerText=result.sources.map(s=>s.name+" ("+s.weatherModifier+")").join(', ');
}
}
}

mapImg.onclick=handleClick;

document.getElementById('loadMap').onclick=()=>{
mapImg.src=document.getElementById('mapUrl').value;
}

document.getElementById('save').onclick=save;
document.getElementById('clear').onclick=clearSel;

</script>
</body>
</html>
